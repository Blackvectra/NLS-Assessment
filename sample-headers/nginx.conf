# nginx server block for NLS-Assessment HTML reports.
# Include via:  include /etc/nginx/snippets/nls-assessment-security.conf;
# inside your server { ... } block.
#
# Provides full Content-Security-Policy enforcement (including frame-ancestors)
# which the bundled meta-tag CSP cannot enforce per MDN/W3C CSP3.

# HSTS — opt-in to preload list at hstspreload.org
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Full CSP including the directives meta-CSP cannot enforce
add_header Content-Security-Policy "default-src 'none'; style-src 'unsafe-inline'; img-src https: data:; script-src 'unsafe-inline'; font-src 'self'; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; require-trusted-types-for 'script'" always;

# Defense in depth
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

# Cross-origin isolation
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Cache hygiene — reports may contain sensitive data
add_header Cache-Control "private, no-store" always;

# Force correct content type
location ~* \.html$ {
    add_header Content-Type "text/html; charset=utf-8" always;
}
