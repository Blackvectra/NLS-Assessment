# GitHub issue picker — surfaces the security disclosure channel BEFORE the
# operator can open a public issue describing a vulnerability.
blank_issues_enabled: false
contact_links:
  - name: 🔒 Report a security vulnerability (private)
    url: https://github.com/Blackvectra/NLS-Assessment/security/advisories/new
    about: |
      Do NOT open a public issue for security vulnerabilities. Use GitHub's
      private security advisory flow so the report stays confidential until
      coordinated disclosure. See SECURITY.md for the full policy + SLA.
  - name: 📋 Vulnerability Disclosure Policy
    url: https://github.com/Blackvectra/NLS-Assessment/blob/main/docs/VULNERABILITY-DISCLOSURE-POLICY.md
    about: |
      Our full VDP (CISA BOD 20-01 aligned): scope, safe harbor, SLA,
      what to include in a report, and how we coordinate disclosure.
  - name: 💬 General question
    url: https://github.com/Blackvectra/NLS-Assessment/discussions
    about: |
      For "how do I do X" questions, configuration help, or design discussion,
      please use Discussions rather than Issues.
