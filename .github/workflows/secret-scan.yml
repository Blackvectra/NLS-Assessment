# Secret scanning — Gitleaks + TruffleHog.
#
# Two complementary scanners run on every push and PR:
#   - Gitleaks   — fast regex/entropy scan across the full git history.
#   - TruffleHog — slower, verifies candidate secrets against live APIs
#                  (only reports secrets it can confirm are active).
#
# Both third-party actions are SHA-pinned (not tag-pinned) so a moving
# tag can't silently re-point at a malicious commit — the same
# supply-chain rule CodeQL enforces on this repo. Dependabot
# (github-actions ecosystem) opens a PR when either publishes a new
# release, with the new SHA in the diff.
#
# This is a separate workflow file (not folded into ci.yml) so that a
# bad pin or a scanner-service hiccup fails only secret scanning, never
# the core Pester / PSScriptAnalyzer / manifest gates.

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-history sweep catches anything that slipped in via a
    # force-push or a branch that bypassed PR review.
    - cron: '41 6 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Gitleaks scans history; fetch all commits, not just the tip.
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          # GITLEAKS_LICENSE is only required for GitHub *organization*
          # private repos. Public repos (both of ours) run free with no
          # token. If these repos ever go private under an org, add the
          # license as a repo secret and it is picked up automatically.
          GITLEAKS_ENABLE_SUMMARY: "true"

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog verified scan
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          # Scan the whole working tree. --results=verified,unknown keeps
          # noise low: only secrets TruffleHog could verify against a live
          # service, plus ones it couldn't reach to disprove. Confirmed
          # false positives are dropped.
          extra_args: --results=verified,unknown
