# Secret scanning — Gitleaks + TruffleHog.
#
# Two complementary scanners run on every push and PR:
#   - Gitleaks   — fast regex/entropy scan across the full git history.
#   - TruffleHog — slower, verifies candidate secrets against live APIs
#                  (only reports secrets it can confirm are active).
#
# Both third-party actions are SHA-pinned (not tag-pinned) so a moving
# tag can't silently re-point at a malicious commit — the same
# supply-chain rule CodeQL enforces on this repo. Dependabot
# (github-actions ecosystem) opens a PR when either publishes a new
# release, with the new SHA in the diff.
#
# This is a separate workflow file (not folded into ci.yml) so that a
# bad pin or a scanner-service hiccup fails only secret scanning, never
# the core Pester / PSScriptAnalyzer / manifest gates.

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-history sweep catches anything that slipped in via a
    # force-push or a branch that bypassed PR review.
    - cron: '41 6 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Upload gitleaks SARIF to the Code Scanning UI.
      security-events: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Gitleaks scans git history; fetch all commits, not just the tip.
          fetch-depth: 0

      # Run the gitleaks BINARY directly rather than the marketplace action.
      # The gitleaks-action wrapper requires a paid GITLEAKS_LICENSE for
      # organization-owned repos (even public ones — Blackvectra is an org),
      # and fails fast without it. The CLI itself is MIT and free with no
      # license check, and pulling a pinned release binary is one fewer
      # third-party action in the supply chain.
      - name: Install gitleaks (pinned)
        run: |
          set -euo pipefail
          VERSION=8.30.1
          curl -fSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks version

      - name: Gitleaks scan (git history)
        run: |
          set -euo pipefail
          # --redact: never print the secret value itself.
          # --exit-code 1: fail the job if any leak is found.
          # SARIF report uploads to Code Scanning in the next step.
          /tmp/gitleaks git . --redact --exit-code 1 \
            --report-format sarif --report-path /tmp/gitleaks.sarif

      - name: Upload gitleaks SARIF
        if: always() && hashFiles('/tmp/gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/gitleaks.sarif
          category: gitleaks

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog verified scan
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          # Scan the whole working tree. --results=verified,unknown keeps
          # noise low: only secrets TruffleHog could verify against a live
          # service, plus ones it couldn't reach to disprove. Confirmed
          # false positives are dropped.
          extra_args: --results=verified,unknown
