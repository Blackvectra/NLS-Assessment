name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pester:
    name: Pester Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester (>= 5.5.0)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Fast-path: if a satisfying Pester is already on the runner, skip the
          # network call entirely. (Whether ubuntu-latest preinstalls Pester
          # depends on the runner image version, so we don't claim it does —
          # this is a no-op skip when no module is present.)
          $have = Get-Module -ListAvailable Pester |
                  Where-Object { $_.Version -ge [version]'5.5.0' } |
                  Sort-Object Version -Descending |
                  Select-Object -First 1
          if ($have) {
              Write-Host ('Pester {0} already installed at {1} — skipping install.' -f $have.Version, $have.ModuleBase)
              return
          }

          # Slow path: retry the install up to 3x with exponential backoff to
          # ride out brief PSGallery / PSResourceGet hiccups. The upper bound
          # '[5.5.0,5.99.99]' prevents an unreleased breaking 6.x from being
          # auto-adopted on the next CI run (CI green is a load-bearing signal;
          # bumping the major needs to be a deliberate edit, not a surprise).
          $delays = @(2, 4, 8)
          $lastErr = $null
          for ($i = 0; $i -lt $delays.Length; $i++) {
              try {
                  if (Get-Command Install-PSResource -ErrorAction SilentlyContinue) {
                      Install-PSResource -Name Pester -Version '[5.5.0,5.99.99]' -TrustRepository -Scope CurrentUser -ErrorAction Stop
                  } else {
                      if (Get-PSRepository PSGallery -ErrorAction SilentlyContinue) {
                          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
                      }
                      Install-Module -Name Pester -MinimumVersion 5.5.0 -MaximumVersion 5.99.99 -Force -Scope CurrentUser -SkipPublisherCheck -AllowClobber -ErrorAction Stop
                  }
                  $lastErr = $null
                  break
              } catch {
                  $lastErr = $_
                  Write-Host ('Install attempt failed: {0}' -f $_.Exception.Message) -ForegroundColor Yellow
                  if ($i -lt $delays.Length - 1) {
                      Write-Host ('Retrying in {0}s...' -f $delays[$i])
                      Start-Sleep -Seconds $delays[$i]
                  }
              }
          }
          if ($lastErr) { throw $lastErr }

          (Get-Module -ListAvailable Pester | Sort-Object Version -Descending | Select-Object -First 1).Version

      - name: Diagnostics — pwsh + Pester + parse test file
        shell: pwsh
        run: |
          Write-Host ('pwsh version: {0}' -f $PSVersionTable.PSVersion)
          Write-Host ('OS: {0}' -f $PSVersionTable.OS)
          $p = (Get-Module -ListAvailable Pester | Sort-Object Version -Descending | Select-Object -First 1)
          Write-Host ('Pester version: {0} at {1}' -f $p.Version, $p.ModuleBase)

          # AST parse check — distinguishes syntax errors in the test file
          # from Pester runtime issues.
          $tokens = $null
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            './Testing/NLS.Security.Tests.ps1', [ref]$tokens, [ref]$errors)
          if ($errors -and $errors.Count -gt 0) {
            Write-Host ''
            Write-Host 'PARSE ERRORS IN TEST FILE:' -ForegroundColor Red
            $errors | ForEach-Object { Write-Host ('  Line {0}: {1}' -f $_.Extent.StartLineNumber, $_.Message) }
            throw 'Test file does not parse — fix syntax before Pester can run.'
          }
          Write-Host 'Test file AST parses cleanly.'

      - name: Run Pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './Testing/NLS.Security.Tests.ps1'
          $config.Run.Exit = $true
          $config.Run.Throw = $false
          $config.Output.Verbosity = 'Diagnostic'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'pester-results.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $config

      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: pester-results.xml
          if-no-files-found: warn

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # security-events: write is required for the upload-sarif step at the
      # bottom of this job. Without it, the SARIF upload silently no-ops and
      # PowerShell findings never reach the Code Scanning UI.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Fast-path: skip the gallery round-trip if a module is already
          # present. (Whether ubuntu-latest preinstalls PSScriptAnalyzer
          # depends on the runner image version.)
          $have = Get-Module -ListAvailable PSScriptAnalyzer |
                  Sort-Object Version -Descending |
                  Select-Object -First 1
          if ($have) {
              Write-Host ('PSScriptAnalyzer {0} already installed at {1} — skipping install.' -f $have.Version, $have.ModuleBase)
              return
          }

          # Slow path: retry 3x with exponential backoff to ride out brief
          # PSGallery / PSResourceGet transient failures. Pinned <2.x to
          # prevent a future breaking major from auto-adopting on every run.
          $delays = @(2, 4, 8)
          $lastErr = $null
          for ($i = 0; $i -lt $delays.Length; $i++) {
              try {
                  if (Get-Command Install-PSResource -ErrorAction SilentlyContinue) {
                      Install-PSResource -Name PSScriptAnalyzer -Version '[1.21.0,1.99.99]' -TrustRepository -Scope CurrentUser -ErrorAction Stop
                  } else {
                      if (Get-PSRepository PSGallery -ErrorAction SilentlyContinue) {
                          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
                      }
                      Install-Module -Name PSScriptAnalyzer -MinimumVersion 1.21.0 -MaximumVersion 1.99.99 -Force -Scope CurrentUser -AllowClobber -ErrorAction Stop
                  }
                  $lastErr = $null
                  break
              } catch {
                  $lastErr = $_
                  Write-Host ('Install attempt failed: {0}' -f $_.Exception.Message) -ForegroundColor Yellow
                  if ($i -lt $delays.Length - 1) {
                      Write-Host ('Retrying in {0}s...' -f $delays[$i])
                      Start-Sleep -Seconds $delays[$i]
                  }
              }
          }
          if ($lastErr) { throw $lastErr }

      - name: Run analyzer
        shell: pwsh
        run: |
          $settings = Resolve-Path ./PSScriptAnalyzerSettings.psd1
          $results = @(Invoke-ScriptAnalyzer -Path . -Recurse -Settings $settings)

          # ── Emit SARIF for Code Scanning ────────────────────────────────────
          # PSScriptAnalyzer does not ship a native SARIF formatter, so we
          # build a minimal SARIF 2.1.0 document from the result objects.
          # The upload-sarif step at the bottom of this job sends it to the
          # Code Scanning UI alongside any CodeQL results.
          $repoRoot = (Resolve-Path '.').Path
          function To-SarifLevel { param([string]$s)
              switch ($s) {
                  'Error'       { 'error' }
                  'ParseError'  { 'error' }
                  'Warning'     { 'warning' }
                  'Information' { 'note' }
                  default       { 'warning' }
              }
          }
          $sarifResults = foreach ($r in $results) {
              $rel = $r.ScriptPath
              if ($rel -and $rel.StartsWith($repoRoot)) {
                  $rel = $rel.Substring($repoRoot.Length).TrimStart([char]'/',[char]'\')
                  $rel = $rel -replace '\\','/'
              }
              [pscustomobject]@{
                  ruleId  = $r.RuleName
                  level   = (To-SarifLevel $r.Severity)
                  message = @{ text = [string]$r.Message }
                  locations = @(@{
                      physicalLocation = @{
                          artifactLocation = @{ uri = $rel }
                          region = @{
                              # SARIF 2.1.0 requires startLine/startColumn >= 1.
                              # PSScriptAnalyzer occasionally emits 0 for whole-
                              # file rules (e.g. manifest-level checks); clamp
                              # those up to 1 so the SARIF validates.
                              startLine   = [Math]::Max(1, [int]$r.Line)
                              startColumn = [Math]::Max(1, [int]$r.Column)
                          }
                      }
                  })
              }
          }
          $sarif = [ordered]@{
              '$schema' = 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json'
              version   = '2.1.0'
              runs      = @(@{
                  tool = @{
                      driver = @{
                          name            = 'PSScriptAnalyzer'
                          version         = ([string](Get-Module -ListAvailable PSScriptAnalyzer | Sort-Object Version -Descending | Select-Object -First 1).Version)
                          informationUri  = 'https://github.com/PowerShell/PSScriptAnalyzer'
                      }
                  }
                  results = @($sarifResults)
              })
          }
          $sarif | ConvertTo-Json -Depth 12 | Out-File -LiteralPath ./psscriptanalyzer.sarif -Encoding utf8
          Write-Host ('Wrote SARIF: psscriptanalyzer.sarif ({0} findings)' -f $sarifResults.Count)

          # ── Console summary (and gate on Error severity) ────────────────────
          if (-not $results -or $results.Count -eq 0) {
            Write-Host "PSScriptAnalyzer: clean." -ForegroundColor Green
            exit 0
          }

          $errors   = @($results | Where-Object Severity -eq 'Error')
          $warnings = @($results | Where-Object Severity -eq 'Warning')
          $infos    = @($results | Where-Object Severity -eq 'Information')

          Write-Host ''
          Write-Host 'PSScriptAnalyzer summary:' -ForegroundColor Cyan
          Write-Host ('  Errors:        {0}' -f $errors.Count)
          Write-Host ('  Warnings:      {0}' -f $warnings.Count)
          Write-Host ('  Informational: {0}' -f $infos.Count)
          Write-Host ''

          if ($errors.Count -gt 0) {
            Write-Host 'Errors (CI fails on these):' -ForegroundColor Red
            $errors | Format-Table RuleName,Severity,ScriptName,Line,Message -AutoSize -Wrap
          }
          if ($warnings.Count -gt 0) {
            Write-Host 'Warnings (informational — does not fail CI):' -ForegroundColor Yellow
            $warnings | Format-Table RuleName,Severity,ScriptName,Line,Message -AutoSize -Wrap
          }

          if ($errors.Count -gt 0) {
            throw ("PSScriptAnalyzer found {0} Error-severity finding(s)." -f $errors.Count)
          }

      - name: Upload PSScriptAnalyzer results to Code Scanning
        # Run even if the analyzer step failed, so Error-severity findings
        # still surface in the Code Scanning UI for triage.
        if: always() && hashFiles('psscriptanalyzer.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: psscriptanalyzer.sarif
          # `category` namespaces results so PSScriptAnalyzer findings don't
          # collide with CodeQL findings in the same repo.
          category: psscriptanalyzer

  manifest:
    name: Module Manifest + controls.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest parses + has required fields
        shell: pwsh
        run: |
          # Test-ModuleManifest loads RequiredModules to validate them — those
          # aren't installed in CI (Microsoft.Graph / EXO / Teams = 500MB and
          # ~3 min to install). Use Import-PowerShellDataFile instead: catches
          # syntax errors and lets us assert the structural fields directly.
          $m = Import-PowerShellDataFile -LiteralPath ./NLS-Assessment.psd1 -ErrorAction Stop

          $required = @('ModuleVersion','GUID','Author','RootModule','FunctionsToExport','PowerShellVersion','CompatiblePSEditions')
          $missing = $required | Where-Object { -not $m.ContainsKey($_) }
          if ($missing) { throw ('Manifest missing required keys: {0}' -f ($missing -join ', ')) }

          if ($m.ModuleVersion -notmatch '^\d+\.\d+\.\d+') {
            throw ('ModuleVersion "{0}" is not a valid semver prefix' -f $m.ModuleVersion)
          }
          if (-not (Test-Path -LiteralPath (Join-Path '.' $m.RootModule))) {
            throw ('RootModule "{0}" not found on disk' -f $m.RootModule)
          }

          Write-Host ('Manifest valid: v{0}' -f $m.ModuleVersion)
          Write-Host ('FunctionsToExport count: {0}' -f @($m.FunctionsToExport).Count)
          Write-Host ('PSEdition: {0}' -f ($m.CompatiblePSEditions -join ', '))
          Write-Host ('PowerShellVersion: {0}' -f $m.PowerShellVersion)
          if ($m.RequiredModules) {
            Write-Host ('Required modules: {0}' -f @($m.RequiredModules).Count)
          }

      - name: Validate controls.json parses
        shell: pwsh
        run: |
          $j = Get-Content -LiteralPath ./Config/controls.json -Raw | ConvertFrom-Json -ErrorAction Stop
          if (-not $j.controls) { throw 'controls.json missing top-level "controls" array.' }
          Write-Host ('controls.json: {0} controls' -f $j.controls.Count)
