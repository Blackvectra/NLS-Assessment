# OSSF Scorecard — automated security-health metric.
#
# Runs the OpenSSF Scorecard checks (branch-protection, signed-releases,
# pinned dependencies, CodeQL presence, fuzzing, token permissions, etc.)
# weekly and on push to main. Results upload to Code Scanning so the
# Scorecard score appears alongside other security findings.
#
# Adds zero runtime cost — runs on its own schedule.

name: OSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '17 4 * * 1'
  push:
    branches: [ main ]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to Code Scanning
      security-events: write
      # Needed to publish results and get a badge
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        # SHA-pinned (not tag-pinned) per CodeQL's supply-chain rule:
        # ossf/scorecard-action is 3rd-party, so a moving tag would let
        # the maintainer (or an attacker who compromises the org) re-point
        # `v2` at any future commit. Pin the exact tree we trust today.
        # Dependabot (github-actions ecosystem) will open a PR when this
        # action publishes a newer release, with the new SHA in the diff.
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Public repos do not need publish_results; keep false to avoid
          # an extra api call.
          publish_results: false

      - name: Upload artifact (5-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: ossf-scorecard
